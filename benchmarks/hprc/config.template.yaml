# Liftoff is the dominant per-sample cost in Mode B (~30 min / haplotype /
# gene panel). ESM2 is optional and orthogonal; leave off for scale.
with_esm: false

# Optional constraint overlays (see 1000g_acmg/config.template.yaml comments).
# gnomad_constraint: data/gnomad/gnomad_v4_constraint_metrics.tsv
# clingen_dosage:    data/clingen/clingen_dosage_sensitivity.tsv

threads_per_gene: 4
mem_mb_per_gene: 8000
