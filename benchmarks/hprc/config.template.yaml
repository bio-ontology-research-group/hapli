# Template Snakemake config for the HPRC R2 × Mode B benchmark.
#
# Copy this file, fill in the paths + the `haps:` block (generated by
# `fetch.py --print-config`), and run:
#   uv run snakemake -s workflows/Snakefile --configfile <your-config>.yaml \
#       --cores <N>

mode: B
output_dir: results/hprc/

# Reference + annotation (GRCh38 + GENCODE v45).
reference: data/grch38/GRCh38.primary_assembly.genome.fa
gff:       data/grch38/gencode.v45.annotation.gff3

# Per-sample assembled haplotype FASTAs (from fetch.py).
haps:
  HG00438:
    hap1: data/hprc/assemblies/HG00438.hap1.fa
    hap2: data/hprc/assemblies/HG00438.hap2.fa
  HG00621:
    hap1: data/hprc/assemblies/HG00621.hap1.fa
    hap2: data/hprc/assemblies/HG00621.hap2.fa
  # … add more samples here. `fetch.py --print-config` emits the YAML automatically.

# Gene panel. For the headline HPRC scale demo, re-use the ACMG SF v3.2 list
# from the 1000G benchmark so the two cohorts are directly comparable; or
# leave `genes:` empty to auto-discover from the GFF (all protein-coding
# genes, ~20,000).
