# Don't run ESM2 at cohort scale — it adds 1–2 h/sample/gene and the bulk
# signal is already the honest null in paper §3.3.
with_esm: false

# Optional constraint / ClinVar / AlphaMissense overlays. Populate + uncomment
# to annotate the output. All are opt-in.
# gnomad_constraint: data/gnomad/gnomad_v4_constraint_metrics.tsv
# clingen_dosage:    data/clingen/clingen_dosage_sensitivity.tsv
# alphamissense_table: data/alphamissense/AlphaMissense_hg38.tsv.gz
# clinvar_vcf:         data/clinvar/clinvar.vcf.gz

# Per-(sample, gene) resources. Each rule runs in <10 min typically; set
# higher if your cluster has memory pressure.
threads_per_gene: 2
mem_mb_per_gene: 4000
