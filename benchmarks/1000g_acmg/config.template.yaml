# Template Snakemake config for the 1000G + ACMG-SF-v3.2 benchmark.
#
# Copy this file, fill in the absolute paths, and run:
#   uv run snakemake -s workflows/Snakefile --configfile <your-config>.yaml \
#       --cores <N>
#
# Expected fetch.py outputs live in <data_root>/1000g_acmg/.

mode: A
output_dir: results/1000g_acmg/

# Reference + annotation (GRCh38 + GENCODE v45).
reference: data/grch38/GRCh38.primary_assembly.genome.fa
gff:       data/grch38/gencode.v45.annotation.gff3

# The regioned, concatenated phased VCF produced by fetch.py.
vcf: data/1000g_acmg/acmg.phased.vcf.gz

# Leave `samples:` empty to use every sample in the VCF; or restrict to a
# specific list for a scale-down run (uncomment + populate from samples.txt).
samples: []
# samples:
#   - HG00096
#   - HG00097
#   - NA12878

# ACMG SF v3.2 gene list; auto-generated by `fetch.py` from the TSV.
genes:
